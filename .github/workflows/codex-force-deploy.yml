name: Codex Forced Homepage Deploy

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy-homepage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Force upload homepage with diagnostics
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          FTP_DIR: ${{ secrets.FTP_DIR }}
        run: |
          set +e
          sudo apt-get install -y lftp >/tmp/apt.log 2>&1
          {
            echo "time=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "ftp_host_set=$([ -n "$FTP_HOST" ] && echo yes || echo no)"
            echo "ftp_user_set=$([ -n "$FTP_USER" ] && echo yes || echo no)"
            echo "ftp_pass_set=$([ -n "$FTP_PASS" ] && echo yes || echo no)"
            echo "ftp_dir_set=$([ -n "$FTP_DIR" ] && echo yes || echo no)"
            echo "ftp_dir_length=${#FTP_DIR}"
          } > deploy-diagnostic.txt
          lftp -c "
            set ssl:verify-certificate no;
            set ftp:passive-mode yes;
            set ftp:ssl-allow no;
            set net:timeout 30;
            set net:max-retries 1;
            open -u ${FTP_USER},${FTP_PASS} ftp://${FTP_HOST};
            cd ${FTP_DIR};
            pwd;
            put index.html -o index.html;
            quit
          " >> deploy-diagnostic.txt 2>&1
          echo "lftp_exit=$?" >> deploy-diagnostic.txt

      - name: Commit sanitized diagnostic
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add deploy-diagnostic.txt
          git commit -m "Add sanitized deploy diagnostic" || true
          git push || true
